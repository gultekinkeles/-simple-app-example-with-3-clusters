apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-pre-prod

resources:
  - ../../

replicas:
  - name: nginx
    count: 2

commonLabels:
  environment: pre-prod

configMapGenerator:
  - name: index-html
    literals:
      - index.html=<html><body><h1>Hello World from PRE-PROD Cluster</h1></body></html>
    behavior: replace
