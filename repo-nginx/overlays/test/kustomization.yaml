apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-test

resources:
  - ../../

replicas:
  - name: nginx
    count: 1

commonLabels:
  environment: test

configMapGenerator:
  - name: index-html
    literals:
      - index.html=<html><body><h1>Hello World from TEST Cluster</h1></body></html>
    behavior: replace
