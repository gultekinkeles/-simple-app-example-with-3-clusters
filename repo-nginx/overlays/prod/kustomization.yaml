apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-prod

resources:
  - ../../

replicas:
  - name: nginx
    count: 3

commonLabels:
  environment: prod

configMapGenerator:
  - name: index-html
    literals:
      - index.html=<html><body><h1>Hello World from PROD Cluster</h1></body></html>
    behavior: replace
