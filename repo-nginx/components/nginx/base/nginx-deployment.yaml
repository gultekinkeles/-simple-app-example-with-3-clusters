apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: webserver
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx
        app.kubernetes.io/name: nginx
        app.kubernetes.io/component: webserver
    spec:
      containers:
      - name: nginx
        image: registry.redhat.io/rhel8/nginx-120:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NGINX_CONTAINER_RUN_AS
          value: nginx
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: html-volume
          mountPath: /opt/app-root/src/nginx-start/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: index-html
          defaultMode: 420