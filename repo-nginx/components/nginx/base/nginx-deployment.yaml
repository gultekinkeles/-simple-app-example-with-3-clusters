apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: webserver
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx
        app.kubernetes.io/name: nginx
        app.kubernetes.io/component: webserver
    spec:
      containers:
      - name: nginx
        image: registry.redhat.io/rhel8/nginx-120:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        # TERTEMİZ ÇÖZÜM: ConfigMap'i doğrudan Nginx'in ana html klasörüne basıyoruz. 
        # Çakışma yaratan PVC mount'unu buradan kaldırıyoruz!
        - name: index-config
          mountPath: /usr/share/nginx/html
      volumes:
      # Sadece ConfigMap'i bağlamamız "Hello World" sayfasının basılması için tamamen yeterlidir
      - name: index-config
        configMap:
          name: index-html