apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: product-catalog

resources:
  - ../../components/client/base
  - ../../components/server/base
  - ../../components/database/base
replicas:
  - name: server
    count: 1
  - name: client
    count: 1

commonLabels:
  environment: test

patchesStrategicMerge:
  - patches/route-host.yaml
